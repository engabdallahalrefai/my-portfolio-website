    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0B0B0B; font-family: 'Comfortaa', sans-serif; color: white; overflow-x: hidden; }

        /*================ HEADER ================*/
        header { padding: 70px 8% 40px; text-align: center; }
        header h1 { font-size: 3rem; margin-bottom: 15px; }
        header p { color: #b8b8b8; font-size: 1rem; max-width: 700px; margin: auto; line-height: 1.8; }

        /*================ GRID ================*/
        .gallery { width: min(1400px, 90%); margin: auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 35px; padding-bottom: 80px; }

        /*================ CARD ================*/
        .card { position: relative; overflow: hidden; border-radius: 28px; background: #161616; border: 1px solid rgba(255, 255, 255, .08); transition: .45s; cursor: pointer; aspect-ratio: 1/1; }
        .card:hover { transform: translateY(-12px); box-shadow: 0 25px 60px rgba(0, 173, 204, .25); }
        .card img { width: 100%; height: 100%; object-fit: cover; transition: 1s cubic-bezier(.2, .8, .2, 1); }
        .card:hover img { transform: scale(1.07) rotate(.8deg); }

        /*================ OVERLAY ================*/
        .overlay { position: absolute; left: 0; right: 0; bottom: 0; padding: 30px; background: linear-gradient(transparent, rgba(0, 0, 0, .35), rgba(0, 0, 0, .92)); transition: .4s; }
        .category { font-size: .75rem; letter-spacing: 2px; color: #FDD600; margin-bottom: 8px; text-transform: uppercase; }
        .title { font-size: 1.4rem; font-weight: 700; margin-bottom: 10px; }
        .description { font-size: .9rem; color: #d6d6d6; line-height: 1.7; }

        /*================ ICON ================*/
        .icon { position: absolute; top: 22px; left: 22px; width: 48px; height: 48px; border-radius: 50%; background: rgba(255, 255, 255, .15); backdrop-filter: blur(15px); display: flex; justify-content: center; align-items: center; font-size: 20px; opacity: 0; transform: translateY(-20px); transition: .4s; }
        .card:hover .icon { opacity: 1; transform: translateY(0); }

        /*================ LIGHTBOX ================*/
        .lightbox { position: fixed; inset: 0; background: rgba(0, 0, 0, .94); display: none; justify-content: center; align-items: center; z-index: 999; padding: 40px; }
        .lightbox img { max-width: 90%; max-height: 90%; border-radius: 20px; box-shadow: 0 30px 60px rgba(0, 0, 0, .5); animation: zoom .35s; }
        @keyframes zoom { from { transform: scale(.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .close { position: absolute; top: 30px; right: 40px; font-size: 45px; cursor: pointer; color: white; }

        /*================ BACK BUTTON STYLE ================*/
        .back-btn { position: absolute; top: 35px; left: 45px; display: flex; align-items: center; gap: 12px; padding: 8px 18px 8px 10px; border-radius: 999px; text-decoration: none; color: #fff; font-family: 'Cairo', sans-serif; font-size: 14px; font-weight: 700; background: rgba(255, 255, 255, .06); border: 1px solid rgba(255, 255, 255, .12); backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px); box-shadow: 0 10px 30px rgba(0, 0, 0, .25), inset 0 1px 0 rgba(255, 255, 255, .08); transition: .35s cubic-bezier(.2, .8, .2, 1); z-index: 999; }
        .back-btn:hover { transform: translateY(-3px); background: rgba(249, 115, 22, .18); border-color: rgba(249, 115, 22, .5); box-shadow: 0 18px 35px rgba(249, 115, 22, .25); }
        .back-btn .btn-icon { width: 34px; height: 34px; border-radius: 50%; display: flex; justify-content: center; align-items: center; background: rgba(255, 255, 255, .08); border: 1px solid rgba(255, 255, 255, .08); transition: .35s; }
        .back-btn:hover .btn-icon { background: #f97316; transform: translateX(-4px); }
        .back-btn i { font-size: 13px; color: white; }
    </style>
